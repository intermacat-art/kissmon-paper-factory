<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>親親獸剪紙工廠</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; font-family: "Microsoft JhengHei", "Arial", sans-serif; }
  body { display: flex; justify-content: center; align-items: center; }
  #game { position: relative; width: 1280px; height: 720px; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
  canvas { display: block; background: #222; }
  #hud { position: absolute; top: 20px; left: 20px; display: flex; gap: 6px; z-index: 10; }
  #hud img { width: 52px; height: 52px; image-rendering: pixelated; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5)); }
  #timer { position: absolute; top: 20px; right: 24px; color: #fff; font-size: 52px; font-weight: 900; letter-spacing: 2px;
           text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; z-index: 25;
           font-family: "Courier New", monospace; background: rgba(0,0,0,0.45); padding: 6px 20px; border-radius: 10px; }
  #speedmul { position: absolute; top: 90px; right: 24px; color: #FFD84D; font-size: 32px; font-weight: 900; letter-spacing: 1px;
              text-shadow: 2px 2px 0 #000, -1px -1px 0 #000; z-index: 25;
              font-family: "Courier New", monospace; background: rgba(0,0,0,0.45); padding: 4px 16px; border-radius: 8px; }
  #stun { position: absolute; left: 10px; top: 220px; width: 420px; z-index: 15; display: none;
          image-rendering: pixelated;
          filter: drop-shadow(0 0 18px rgba(180,140,255,0.9)); }
  #endgame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 20; cursor: pointer; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; color: #fff;
             display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
             padding-bottom: 60px; z-index: 30; cursor: pointer; pointer-events: auto; }
  #overlay.loading { background: rgba(0,0,0,0.85); justify-content: center; padding: 0; }
  #overlay .prompt { font-size: 44px; padding: 18px 56px; background: #fff; color: #222;
                    border-radius: 16px; font-weight: 900; letter-spacing: 2px;
                    box-shadow: 0 8px 0 #8B1E3F, 0 10px 24px rgba(0,0,0,0.4);
                    animation: pulse 0.9s ease-in-out infinite alternate; }
  #overlay .loading-text { font-size: 28px; }
  #overlay .result { font-size: 42px; color: #fff; font-weight: 900; letter-spacing: 2px;
                    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000; margin: 4px 0; }
  #overlay .result.accent { color: #FFD84D; font-size: 54px; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.06); } }
  .loading { font-size: 28px; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas" width="1280" height="720"></canvas>
  <div id="hud"></div>
  <div id="timer">00:00.0</div>
  <div id="speedmul">x1.0</div>
  <img id="stun" src="">
  <img id="endgame" src="a/bg/endgame.png">
  <div id="overlay" class="loading">
    <div class="loading-text">Loading...</div>
  </div>
</div>
<script>
const C = document.getElementById('canvas');
const ctx = C.getContext('2d');
const W = 1280, H = 720;

const AP = {
  bg:     'a/bg/factory.png',
  belt:   'a/bg/belt.png',
  kiss1:  'a/mon/k1.png',
  kiss2:  'a/mon/k2.png',
  kiss3:  'a/mon/k3.png',
  stun:   'a/mon/stun.gif',
  paper:  'a/obj/paper.png',
  cig:    'a/obj/cig.png',
  heart:  'a/ui/heart.png',
};
const VT_FILES = ['v1.gif','v2.png','v3.png','v4.png','v5.png','v6.png','v7.png','v8.png','v9.png'];
const SP = {
  cut:  'a/se/cut.aac',
  miss: 'a/se/miss.aac',
  heal: 'a/se/heal.aac',
};
const BGM_SRC = 'a/bgm/bgm.mp3';
let bgm = null;

const enc = p => p.split('/').map(seg => encodeURIComponent(seg)).join('/');

const imgs = {};
const sfx = {};
function load() {
  const ps = [];
  for (const k in AP) {
    const im = new Image();
    im.src = enc(AP[k]);
    imgs[k] = im;
    ps.push(new Promise(r => { im.onload = r; im.onerror = () => { console.warn('fail', AP[k]); r(); }; }));
  }
  imgs.vts = [];
  for (const f of VT_FILES) {
    const im = new Image();
    im.src = 'a/vt/' + f;
    imgs.vts.push(im);
    ps.push(new Promise(r => { im.onload = r; im.onerror = r; }));
  }
  for (const k in SP) {
    const a = new Audio(enc(SP[k]));
    a.volume = 0.7;
    sfx[k] = a;
  }
  bgm = new Audio(enc(BGM_SRC));
  bgm.loop = true;
  bgm.volume = 0.35;
  document.getElementById('stun').src = enc(AP.stun);
  return Promise.all(ps);
}

let state = 'start';
let hp = 3;
const MAX_HP = 5;
let startTime = 0, elapsed = 0;
let beltSpeed = 6.0;
let speedMul = 1.0;
let lastSpawn = 0, spawnInterval = 500;
let objects = [];
let damageFlash = 0;
let attackState = 0, attackStart = 0;
const ATK_FRAME = 75;
let stunUntil = 0;
let prevHp = -1;
let shakeUntil = 0;
let sparks = [];
let paperCutCount = 0;
let lastCigSpawn = -Infinity;
const CIG_COOLDOWN = 5000;   // 5s between cigs — prevents chain-stun deaths
let pausedAt = 0;

const BELT_SURFACE_Y = 472;   // y-pos of belt top surface (belt.png mapped to 720 canvas)
const MON_X = 10, MON_Y = 220, MON_W = 420;
const MON_BODY_W = 1367;  // trimmed kiss1/2 width; kiss3 shares same body region
// Scissors blade region (red-marked in user's reference): ~55% ~ 100% of kiss3 drawn width.
// kiss3 drawn-width = MON_W * 2132/1367 ≈ 655. Blade range: MON_X + 655*[0.55..1.0] ≈ 370..665
const HIT_X1 = 350, HIT_X2 = 665;
const MIN_SPAWN_GAP = 260;
const BASE_SPEED = 6.0;   // 2x the previous base

function playSfx(k) {
  try { const a = sfx[k].cloneNode(); a.volume = sfx[k].volume; a.play(); } catch (e) {}
}

function sizeByHeight(img, targetH, fallbackW) {
  if (img && img.complete && img.naturalHeight) {
    const ratio = img.naturalWidth / img.naturalHeight;
    return { w: Math.round(targetH * ratio), h: targetH };
  }
  return { w: fallbackW, h: targetH };
}

let vtBag = [];
function nextVt() {
  if (vtBag.length === 0) {
    vtBag = imgs.vts.map((_, i) => i);
    for (let i = vtBag.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [vtBag[i], vtBag[j]] = [vtBag[j], vtBag[i]];
    }
  }
  return imgs.vts[vtBag.pop()];
}

function randObj() {
  const now = performance.now();
  const cigAllowed = now - lastCigSpawn > CIG_COOLDOWN;
  const r = Math.random();
  let img, type, targetH;
  if (r < 0.30)                      { type = 'paper'; img = imgs.paper; targetH = 170; }
  else if (r < 0.50 && cigAllowed)   { type = 'cig';   img = imgs.cig;   targetH = 160; }
  else                               { type = 'vt';    img = nextVt();   targetH = 260; }
  const sz = sizeByHeight(img, targetH, targetH);
  return { type, img, w: sz.w, h: sz.h };
}

function canSpawn() {
  for (const o of objects) {
    if (o.broken) continue;
    if (o.x + o.w / 2 > W - MIN_SPAWN_GAP) return false;
  }
  return true;
}

function spawn() {
  if (!canSpawn()) return;
  const o = randObj();
  o.x = W + 80;
  o.y = BELT_SURFACE_Y + 40;   // bottom of object sits firmly on belt surface
  o.broken = false;
  o.brokenTime = 0;
  o.triggered = false;
  if (o.type === 'cig') lastCigSpawn = performance.now();
  objects.push(o);
}

function attack() {
  if (state !== 'play') return;
  if (performance.now() < stunUntil) return;
  if (attackState !== 0) return;
  attackStart = performance.now();
  attackState = 1;
  playSfx('cut');
}

function updateAttack(now) {
  if (attackState === 0) return;
  const phase = Math.floor((now - attackStart) / ATK_FRAME);
  if (phase >= 3) {
    attackState = 0;
    return;
  }
  const prev = attackState;
  const nxt = phase + 1;
  attackState = nxt;
  if (nxt === 2 && prev < 2) doCut();
}

function doCut() {
  // Only objects whose CENTER is inside the scissors jaw count — not edge overlap.
  // This prevents accidentally cutting an object whose right edge is still at the scissors tip.
  let target = null;
  let best = Infinity;
  const mid = (HIT_X1 + HIT_X2) / 2;
  for (const o of objects) {
    if (o.broken) continue;
    if (o.x >= HIT_X1 && o.x <= HIT_X2) {
      const d = Math.abs(o.x - mid);
      if (d < best) { best = d; target = o; }  // object closest to jaw center
    }
  }
  if (target) {
    target.broken = true;
    target.brokenTime = performance.now();
    spawnSparks(target.x, target.y - target.h / 2);
    if (target.type === 'vt') takeDamage();
    else if (target.type === 'paper') paperCutCount++;
  }
}

function spawnSparks(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 2 + Math.random() * 3;
    sparks.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 1, life: 400, born: performance.now() });
  }
}

function takeDamage() {
  hp--;
  damageFlash = 600;
  shakeUntil = performance.now() + 350;
  playSfx('miss');
  if (hp <= 0) {
    state = 'over';
    if (bgm) bgm.pause();
    // Freeze everything at the moment of death
    shakeUntil = 0;
    damageFlash = 0;
    sparks = [];
    document.getElementById('game').style.transform = '';
    document.getElementById('endgame').style.display = 'block';
    const finalPaper = paperCutCount;
    const finalTime = elapsed.toFixed(1);
    setTimeout(() => {
      const ov = document.getElementById('overlay');
      ov.style.display = 'flex';
      ov.innerHTML = `
        <div class="result">存活 ${finalTime} 秒</div>
        <div class="result accent">剪了 ${finalPaper} 秒的紙</div>
        <div class="prompt">重新開始 (SPACE)</div>
      `;
    }, 1500);
  }
}

function stunPlayer() {
  const dur = 2800;
  stunUntil = performance.now() + dur;
  const el = document.getElementById('stun');
  el.src = enc(AP.stun) + '?t=' + Date.now();   // force gif replay
  // visibility is synced every frame in syncStunOverlay() — no setTimeout
}

function syncStunOverlay() {
  const el = document.getElementById('stun');
  const want = (state === 'play' && performance.now() < stunUntil) ? 'block' : 'none';
  if (el.style.display !== want) el.style.display = want;
}

function update(dt, now) {
  if (state === 'start') {
    const phase = Math.floor((now / 180) % 3);
    attackState = phase + 1;
    return;
  }
  if (state !== 'play') return;
  elapsed = (now - startTime) / 1000;
  speedMul = 1 + Math.floor(elapsed / 10) * 0.5;   // +50% every 10s: 1.0x, 1.5x, 2.0x, 2.5x...
  beltSpeed = BASE_SPEED * speedMul;
  spawnInterval = Math.max(180, 500 / speedMul);

  if (now - lastSpawn > spawnInterval) {
    lastSpawn = now;
    spawn();
  }

  const dtf = dt / 16.67;

  for (const o of objects) {
    if (!o.broken) o.x -= beltSpeed * dtf;
  }

  for (const o of objects) {
    if (o.broken || o.triggered) continue;
    if (o.x + o.w/2 < 0) {
      o.triggered = true;
      if (o.type === 'cig') stunPlayer();
      else if (o.type === 'paper') takeDamage();  // paper escaped = 任務失敗
    }
  }

  sparks = sparks.filter(s => now - s.born < s.life);
  for (const s of sparks) {
    const dtf = dt / 16.67;
    s.x += s.vx * dtf;
    s.y += s.vy * dtf;
    s.vy += 0.25 * dtf;
  }

  objects = objects.filter(o => {
    if (o.broken) return now - o.brokenTime < 500;
    return o.x + o.w/2 > -80;
  });

  updateAttack(now);
  if (damageFlash > 0) damageFlash -= dt;
}

function drawBelt() {
  if (!imgs.belt.complete || !imgs.belt.naturalHeight) return;
  // Belt png is 16:9, same as canvas — draw fullscreen to preserve the artist's intended layout.
  ctx.drawImage(imgs.belt, 0, 0, W, H);
}

function drawMonster() {
  const now = performance.now();
  if (now < stunUntil) return;                       // hide monster completely; stun GIF takes over
  let img = imgs.kiss1;
  if (attackState === 2) img = imgs.kiss2;
  else if (attackState === 3) img = imgs.kiss3;
  else img = imgs.kiss1;

  if (!img.complete || !img.naturalHeight) return;
  const scale = MON_W / MON_BODY_W;
  const w = img.naturalWidth * scale;
  const h = img.naturalHeight * scale;
  const x = MON_X, y = MON_Y;
  ctx.drawImage(img, x, y, w, h);
  if (damageFlash > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'source-atop';
    const g = ctx.createLinearGradient(x, y, x + w, y + h);
    const a = Math.min(1, damageFlash / 600) * 0.75;
    g.addColorStop(0, `rgba(255,40,40,${a})`);
    g.addColorStop(0.5, `rgba(255,80,80,${a * 0.8})`);
    g.addColorStop(1, `rgba(180,0,0,${a})`);
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);
    ctx.restore();
  }
}

function drawObject(o) {
  if (!o.img.complete || !o.img.naturalHeight) return;
  const x = o.x - o.w / 2, y = o.y - o.h;
  if (o.broken) {
    const t = (performance.now() - o.brokenTime) / 500;
    const alpha = Math.max(0, 1 - t);
    const dx = t * 40;
    const rot = t * 0.4;
    ctx.globalAlpha = alpha;
    const nw = o.img.naturalWidth, nh = o.img.naturalHeight;
    // left half
    ctx.save();
    ctx.translate(x - dx, y + o.h/2);
    ctx.rotate(-rot);
    ctx.drawImage(o.img, 0, 0, nw/2, nh, 0, -o.h/2, o.w/2, o.h);
    ctx.restore();
    // right half
    ctx.save();
    ctx.translate(x + o.w/2 + dx, y + o.h/2);
    ctx.rotate(rot);
    ctx.drawImage(o.img, nw/2, 0, nw/2, nh, 0, -o.h/2, o.w/2, o.h);
    ctx.restore();
    ctx.globalAlpha = 1;
  } else {
    ctx.drawImage(o.img, x, y, o.w, o.h);
  }
}

function drawSparks() {
  for (const s of sparks) {
    const t = (performance.now() - s.born) / s.life;
    const a = Math.max(0, 1 - t);
    ctx.fillStyle = `rgba(255,230,80,${a})`;
    ctx.fillRect(s.x - 3, s.y - 3, 6, 6);
  }
}

function applyShake() {
  const now = performance.now();
  const game = document.getElementById('game');
  if (now < shakeUntil) {
    const m = (shakeUntil - now) / 350;
    const dx = (Math.random() - 0.5) * 22 * m;
    const dy = (Math.random() - 0.5) * 22 * m;
    game.style.transform = `translate(${dx}px, ${dy}px)`;
  } else {
    game.style.transform = '';
  }
}

function drawPauseOverlay() {
  if (state !== 'paused') return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 120px "Microsoft JhengHei", "Arial Black", sans-serif';
  ctx.lineWidth = 12;
  ctx.strokeStyle = '#000';
  ctx.strokeText('暫停中', W / 2, H / 2 - 30);
  ctx.fillStyle = '#fff';
  ctx.fillText('暫停中', W / 2, H / 2 - 30);
  ctx.font = 'bold 40px "Microsoft JhengHei", sans-serif';
  ctx.fillStyle = '#FFE45C';
  ctx.fillText('ESC 繼續', W / 2, H / 2 + 70);
  ctx.restore();
}

function drawStunLabel() {
  const now = performance.now();
  if (now >= stunUntil) return;
  ctx.save();
  const cx = MON_X + MON_W / 2 + 10;   // centered over the stun gif
  const bob = Math.sin(now / 140) * 6;
  const cy = 170 + bob;                 // above the stun gif (gif top = 220)
  ctx.font = 'bold 92px "Microsoft JhengHei", "Arial Black", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 11;
  ctx.strokeStyle = '#000';
  ctx.strokeText('暈眩', cx, cy);
  ctx.fillStyle = '#FFE45C';
  ctx.fillText('暈眩', cx, cy);
  ctx.restore();
}

function draw() {
  if (state === 'over') return;   // freeze the last frame — no redraws after death
  ctx.clearRect(0, 0, W, H);
  if (imgs.bg.complete && imgs.bg.naturalHeight) ctx.drawImage(imgs.bg, 0, 0, W, H);
  drawMonster();                  // Monster behind belt
  drawBelt();                     // Belt covers monster lower body
  for (const o of objects) drawObject(o);  // Objects on top of belt
  drawSparks();
  drawStunLabel();                // 暈眩 label over stun gif
  applyShake();
  syncStunOverlay();              // keep stun gif DOM in sync every frame (no setTimeout)
  drawPauseOverlay();

  const t = elapsed;
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  const d = Math.floor((t * 10) % 10);
  document.getElementById('timer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${d}`;
  document.getElementById('speedmul').textContent = `x${speedMul.toFixed(1)}`;

  if (hp !== prevHp) {
    const hud = document.getElementById('hud');
    hud.innerHTML = '';
    for (let i = 0; i < hp; i++) {
      const im = document.createElement('img');
      im.src = enc(AP.heart);
      hud.appendChild(im);
    }
    prevHp = hp;
  }
}

function reset() {
  hp = 3; prevHp = -1;
  state = 'play';
  startTime = performance.now();
  elapsed = 0;
  lastSpawn = performance.now();
  objects = [];
  damageFlash = 0;
  attackState = 0;
  stunUntil = 0;
  shakeUntil = 0;
  sparks = [];
  vtBag = [];
  paperCutCount = 0;
  speedMul = 1.0;
  lastCigSpawn = -Infinity;
  document.getElementById('endgame').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('stun').style.display = 'none';
  if (bgm) {
    bgm.currentTime = 0;
    bgm.play().catch(()=>{});
  }
}

let last = performance.now();
function loop(now) {
  const dt = Math.min(50, now - last);
  last = now;
  update(dt, now);
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'start' || state === 'over') reset();
    else if (state === 'play') attack();
  } else if (e.code === 'Escape') {
    e.preventDefault();
    if (state === 'play') {
      pausedAt = performance.now();
      state = 'paused';
      if (bgm) bgm.pause();
    } else if (state === 'paused') {
      startTime += performance.now() - pausedAt;   // exclude paused time from elapsed
      state = 'play';
      if (bgm) bgm.play().catch(()=>{});
    }
  }
});
document.getElementById('overlay').addEventListener('click', () => { if (state !== 'play') reset(); });
document.getElementById('endgame').addEventListener('click', () => { reset(); });

load().then(() => {
  const ov = document.getElementById('overlay');
  ov.classList.remove('loading');
  ov.innerHTML = '<div class="prompt">開始遊戲 (SPACE)</div>';
  last = performance.now();
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
